name: Dynapyt

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install DynaPyt
        run: |
          python -m pip install pytest libcst dynapyt==3.0.0
          # git clone https://github.com/piyush-bajaj/DynaPyt.git
          # cd DynaPyt
          # pip install -r requirements.txt
          # pip install .
          # cd ..
          
      - name: Instrument the Repository
        run: |
          # python -m dynapyt.run_instrumentation --directory grab/ --analysis CallGraph
          # python -m dynapyt.run_instrumentation --directory tests-min/ --analysis CallGraph
          python -m dynapyt.run_instrumentation --directory grab/ --analysis dynapyt.analyses.CallGraph.CallGraph
          python -m dynapyt.run_instrumentation --directory tests-min/ --analysis dynapyt.analyses.CallGraph.CallGraph

      - name: Install dependencies
        run: |
          python -m pip install . && python -m pip install -r requirements_dev.txt && python -m pip install pytest

      - name: Run the Analysis
        run: |
          # python -m dynapyt.run_analysis --entry run_all_tests.py --analysis CallGraph
          python -m dynapyt.run_analysis --entry run_all_tests.py --analysis dynapyt.analyses.CallGraph.CallGraph

      - name: Upload Dynapyt Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "graph-012_dynapyt.json"
          path: "/home/runner/work/graph-012/graph-012/dynapyt.json"
