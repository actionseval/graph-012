name: Dynapyt

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      
      # - uses: JavidDitty/setup-dynapyt@main
      #   with:
      #     dynapyt-version: "0.2.1"
      #     instrument-directory: "tests/"

      - name: Install dependencies
        run: |
          python -m pip install . && python -m pip install -r requirements_dev.txt && python -m pip install pytest

      - name: Test with pytest
        run: |
          python -m pip install pytest pytest-xdist libcst dynapyt==3.0.0
          python -m dynapyt.run_instrumentation --directory tests/ --analysis dynapyt.analyses.TraceAll.TraceAll
          python -m dynapyt.run_analysis --entry run_all_tests.py --analysis dynapyt.analyses.TraceAll.TraceAll

      - name: Upload Dynapyt Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.DYNAPYT_ARTIFACT_NAME }}
          path: output.log
